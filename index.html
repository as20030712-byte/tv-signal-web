<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>我的交易訊號</title>

<style>
body {
  background: #000;
  color: #fff;
  text-align: center;
  font-family: Arial;
  margin-top: 100px;
}

.signal {
  font-size: 60px;
  font-weight: bold;
}

.buy { color: #00ff88; }
.sell { color: #ff4444; }
.exit { color: #ffd700; }

.star {
  font-size: 30px;
  margin-top: 10px;
  color: #00d4ff;
}
</style>
</head>

<body>

<h1>📈 我的交易訊號</h1>

<div id="signal" class="signal">等待訊號中...</div>
<div id="star" class="star"></div>
<div id="price"></div>
<div id="time"></div>

<script>
const API_URL = "https://tv-signal-web.vercel.app/api/signal";

async function fetchSignal() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const data = await res.json();

    console.log("收到:", data);

    if (!data.signal) return;

    const el = document.getElementById("signal");

    // ===== 顯示訊號 =====
    if (data.signal === "BUY") {
      el.innerText = "BUY";
      el.className = "signal buy";
    }

    else if (data.signal === "SELL") {
      el.innerText = "SELL";
      el.className = "signal sell";
    }

    else if (data.signal === "EXIT") {
      el.innerText = data.side === "LONG" ? "EXIT LONG" : "EXIT SHORT";
      el.className = "signal exit";
    }

    // ===== 星級 =====
    if (data.star) {
      let stars = "★".repeat(parseInt(data.star));
      document.getElementById("star").innerText = stars;
    } else {
      document.getElementById("star").innerText = "";
    }

    // ===== 價格 =====
    document.getElementById("price").innerText = "價格: " + data.price;

    // ===== 時間 =====
    document.getElementById("time").innerText = "更新時間: " + new Date().toLocaleString();

  } catch (e) {
    console.error("錯誤:", e);
  }
}

setInterval(fetchSignal, 1000);
fetchSignal();
</script>

</body>
</html>
