<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>我的交易訊號</title>
</head>
<body style="background:black; color:white; text-align:center; margin-top:100px; font-family:sans-serif;">

  <h1>📈 我的交易訊號</h1>
  <h2 id="signal">等待訊號中...</h2>
  <h3 id="price"></h3>
  <p id="status" style="color:gray;"></p>

  <script>
    async function getSignal() {
      try {
        const res = await fetch("/api/signal");
        const data = await res.json();

        if (!data.signal) {
          document.getElementById("status").innerText = "還沒有收到訊號";
          return;
        }

        document.getElementById("signal").innerText = data.signal;
        document.getElementById("price").innerText = "價格：" + data.price;
        document.getElementById("status").innerText = "已更新";
      } catch (e) {
        document.getElementById("status").innerText = "讀取失敗";
        console.error(e);
      }
    }

    getSignal();
    setInterval(getSignal, 3000);
  </script>

</body>
</html>
