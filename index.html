<script>
async function fetchSignal() {
    try {
        const res = await fetch('/api/signal');
        const data = await res.json();

        const signalEl = document.getElementById("signal");
        const priceEl = document.getElementById("price");
        const timeEl = document.getElementById("time");
        const starEl = document.getElementById("star");

        if (!data || !data.signal) return;

        // 訊號
        signalEl.innerText = data.signal;

        // 顏色
        if (data.signal === "BUY") {
            signalEl.style.color = "#00ff88";
        } else if (data.signal === "SELL") {
            signalEl.style.color = "#ff4d4d";
        } else {
            signalEl.style.color = "#ffaa00";
        }

        // 價格
        priceEl.innerText = "價格：" + (data.price || "--");

        // ⭐ 星星（重點在這）
        if (data.star) {
            let stars = "";
            for (let i = 0; i < Number(data.star); i++) {
                stars += "⭐";
            }
            starEl.innerText = stars;
        } else {
            starEl.innerText = "";
        }

        // 時間
        const now = new Date();
        timeEl.innerText = "更新時間：" + now.toLocaleString();

    } catch (err) {
        console.log("error:", err);
    }
}

// 每2秒抓一次
setInterval(fetchSignal, 2000);
fetchSignal();
</script>
